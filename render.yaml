services:
  - type: web
    name: ai-ecommerce-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: static
    name: ai-ecommerce-client
    rootDir: client
    buildCommand: npm install && npm run build
    publicPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-ecommerce-website-0gsd.onrender.com/api
    routes:
      - path: /*
        destination: /index.html
